<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoSecure — Create Account</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060c18;--surface:#0d1526;--border:#1a2744;--blue:#3b82f6;--text:#e2e8f0;--muted:#64748b}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(59,130,246,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(59,130,246,0.04) 1px,transparent 1px);
  background-size:60px 60px;pointer-events:none}
.orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none}
.orb-1{width:400px;height:400px;background:rgba(59,130,246,0.1);top:-150px;right:-100px}
.box{position:relative;z-index:1;background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:32px 30px;width:100%;max-width:380px;
  box-shadow:0 40px 80px rgba(0,0,0,0.5)}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.brand-icon{width:40px;height:40px;background:linear-gradient(135deg,#1d4ed8,#3b82f6);
  border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.brand-name{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:800}
.brand-name span{color:#3b82f6}
h1{font-family:'Syne',sans-serif;font-size:1.35rem;font-weight:700;margin-bottom:6px}
.subtitle{color:var(--muted);font-size:0.8rem;margin-bottom:24px}
.field{margin-bottom:16px}
label{display:block;font-size:0.7rem;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
input{width:100%;background:#060c18;border:1px solid var(--border);border-radius:8px;
  padding:9px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.85rem;
  transition:border-color 0.2s;outline:none}
input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,0.15)}
.btn{width:100%;background:linear-gradient(135deg,#1d4ed8,#3b82f6);border:none;
  border-radius:8px;padding:10px;color:white;font-family:'Syne',sans-serif;
  font-size:0.85rem;font-weight:700;cursor:pointer;margin-top:6px;transition:opacity 0.2s;
  letter-spacing:0.3px}
.btn:hover{opacity:0.9;transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--muted);font-size:0.75rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.link-row{text-align:center;font-size:0.78rem;color:var(--muted)}
.link-row a{color:var(--blue);text-decoration:none;font-weight:500}
.link-row a:hover{text-decoration:underline}
.back{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:0.75rem;
  text-decoration:none;margin-bottom:20px;transition:color 0.2s;width:fit-content}
.back:hover{color:var(--text)}
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="box">
  <a href="/user/login" class="back">← Back to Sign In</a>
  <div class="brand">
    <div class="brand-icon">🛡️</div>
    <div class="brand-name">Geo<span>Secure</span></div>
  </div>
  <h1>Create account</h1>
  <p class="subtitle">Register to access the emergency SOS system</p>
  <form method="POST">
    <div class="field">
      <label>Full Name</label>
      <input type="text" name="name" placeholder="Your full name" required autofocus>
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" name="email" placeholder="you@example.com" required>
    </div>
    <div class="field">
      <label>Phone Number</label>
      <input type="tel" name="phone" placeholder="+91 98765 43210" required>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="Create a password" required>
    </div>
    <button type="submit" class="btn">Create Account →</button>
  </form>
  {% if error %}
  <div style="margin-top:14px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);
    border-radius:8px;padding:10px 14px;font-size:0.83rem;color:#f87171">
    ❌ {{ error }}
  </div>
  {% endif %}
  <div class="divider">or</div>
  <div class="link-row">Already have an account? <a href="/user/login">Sign in</a></div>
</div>
</body>
</html>
